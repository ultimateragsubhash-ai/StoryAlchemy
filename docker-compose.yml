version: '3.8'

services:
  # MongoDB for story persistence
  mongodb:
    image: mongo:7.0
    container_name: storyalchemy-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: storyalchemy
    volumes:
      - mongo_data:/data/db
    networks:
      - storyalchemy-network

  # Redis for caching
  redis:
    image: redis:7-alpine
    container_name: storyalchemy-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - storyalchemy-network

  # Qdrant for vector search
  qdrant:
    image: qdrant/qdrant:latest
    container_name: storyalchemy-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - storyalchemy-network

  # Optional: MongoDB Express for database GUI
  mongo-express:
    image: mongo-express:latest
    container_name: storyalchemy-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: password123
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: password123
    depends_on:
      - mongodb
    networks:
      - storyalchemy-network

volumes:
  mongo_data:
  redis_data:
  qdrant_data:

networks:
  storyalchemy-network:
    driver: bridge
